<svg width="680" height="430" viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Headers -->
  <text x="195" y="20" text-anchor="middle" font-size="12" fill="#5F5E5A">TECNICAS — el cómo</text>
  <text x="490" y="20" text-anchor="middle" font-size="12" fill="#5F5E5A">INSTRUMENTOS — el con qué</text>
  <line x1="340" y1="30" x2="340" y2="410" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Row 1: Observación -->
  <rect x="40" y="40" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="90" y="62" font-size="14" font-weight="600" fill="#3C3489">Observación</text>
  <text x="90" y="80" font-size="12" fill="#534AB7">Examina el entorno directamente</text>
  <line x1="320" y1="66" x2="358" y2="66" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="40" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="410" y="62" font-size="14" font-weight="600" fill="#085041">Diario de campo / Checklist</text>
  <text x="410" y="80" font-size="12" fill="#0F6E56">Registro y verificación</text>

  <!-- Row 2: Entrevista -->
  <rect x="40" y="112" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="90" y="134" font-size="14" font-weight="600" fill="#3C3489">Entrevista</text>
  <text x="90" y="152" font-size="12" fill="#534AB7">Interacción directa con el sujeto</text>
  <line x1="320" y1="138" x2="358" y2="138" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="112" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="410" y="134" font-size="14" font-weight="600" fill="#085041">Guía de entrevista</text>
  <text x="410" y="152" font-size="12" fill="#0F6E56">Preguntas y temas clave</text>

  <!-- Row 3: Encuesta -->
  <rect x="40" y="184" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="90" y="206" font-size="14" font-weight="600" fill="#3C3489">Encuesta</text>
  <text x="90" y="224" font-size="12" fill="#534AB7">Preguntas estandarizadas masivas</text>
  <line x1="320" y1="210" x2="358" y2="210" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="184" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="410" y="206" font-size="14" font-weight="600" fill="#085041">Fichas de registro</text>
  <text x="410" y="224" font-size="12" fill="#0F6E56">Extracción de información</text>

  <!-- Row 4: Análisis documental -->
  <rect x="40" y="256" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="90" y="278" font-size="14" font-weight="600" fill="#3C3489">Análisis documental</text>
  <text x="90" y="296" font-size="12" fill="#534AB7">Revisa fuentes existentes</text>
  <line x1="320" y1="282" x2="358" y2="282" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="256" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="410" y="278" font-size="14" font-weight="600" fill="#085041">Fichas de registro</text>
  <text x="410" y="296" font-size="12" fill="#0F6E56">Extracción de información</text>

  <!-- Row 5: Cuestionario -->
  <rect x="40" y="328" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="90" y="350" font-size="14" font-weight="600" fill="#3C3489">Cuestionario</text>
  <text x="90" y="368" font-size="12" fill="#534AB7">Preguntas escritas estructuradas</text>
  <line x1="320" y1="354" x2="358" y2="354" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="328" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="410" y="350" font-size="14" font-weight="600" fill="#085041">Escalas de medición</text>
  <text x="410" y="368" font-size="12" fill="#0F6E56">Likert, numérica, etc.</text>

  <!-- Legend -->
  <rect x="40" y="404" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="58" y="414" font-size="12" fill="#5F5E5A">Técnica</text>
  <rect x="130" y="404" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="148" y="414" font-size="12" fill="#5F5E5A">Instrumento</text>

</svg>
